# Gitleaks Configuration for claude-marketplace-registry
# https://github.com/gitleaks/gitleaks

title = "Gitleaks Configuration"

# Extend the default gitleaks configuration
[extend]
useDefault = true

# Allow specific patterns that are known false positives
[allowlist]
description = "Global allowlist for known false positives"

# Allow RFC 2606 example domains (standard documentation examples)
# These are used in documentation and are not real credentials
regexes = [
  '''[a-zA-Z0-9._%+-]+@example\.com''',
  '''[a-zA-Z0-9._%+-]+@example\.org''',
  '''[a-zA-Z0-9._%+-]+@example\.net''',
  '''[a-zA-Z0-9._%+-]+@users\.noreply\.github\.com''',
]

# Allow documentation files that contain example credentials
# These are clearly marked as examples and use placeholder values
paths = [
  '''docs/''',
]

# Suppress false positives on git commit SHAs in plugin manifest data
# The sourcegraph-access-token rule matches 40-char hex strings which
# collide with the "sha" fields used to pin plugin versions
[[rules]]
id = "sourcegraph-access-token"
[rules.allowlist]
paths = [
  '''data/''',
]
