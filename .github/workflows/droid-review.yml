name: Droid Auto Review (Tier 3 - Deep Analysis)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  wait-for-routing:
    # Gate: only run for trusted authors, skip drafts
    if: |
      github.event.pull_request.draft == false &&
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.get-routing.outputs.tier }}
      should_review: ${{ steps.get-routing.outputs.should_review }}
    steps:
      - name: Wait for Route PR to Model and get tier
        id: get-routing
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            // Poll for the "Route PR to Model" workflow to complete
            // and upload its routing-analysis artifact
            const maxAttempts = 20;
            const pollInterval = 15000; // 15 seconds

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'route-pr-to-model.yml',
                head_sha: context.payload.pull_request.head.sha,
                per_page: 1
              });

              const latestRun = runs.data.workflow_runs?.[0] ?? null;

              if (latestRun && latestRun.status === 'completed') {
                console.log(`Route PR to Model completed (run ${latestRun.id})`);

                // Download the routing artifact
                try {
                  const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: latestRun.id
                  });

                  const routingArtifact = artifacts.data.artifacts.find(
                    a => a.name === 'routing-analysis'
                  );

                  if (routingArtifact) {
                    const download = await github.rest.actions.downloadArtifact({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      artifact_id: routingArtifact.id,
                      archive_format: 'zip'
                    });

                    const fs = require('fs');
                    fs.writeFileSync('/tmp/routing.zip', Buffer.from(download.data));

                    const { execSync } = require('child_process');
                    execSync('unzip -o /tmp/routing.zip -d /tmp/routing');

                    const routing = JSON.parse(
                      fs.readFileSync('/tmp/routing/routing-analysis.json', 'utf8')
                    );

                    const tier = routing.tier;
                    console.log(`Routing tier: ${tier}, reason: ${routing.reason}`);
                    core.setOutput('tier', tier);
                    core.setOutput('should_review', tier === 3 ? 'true' : 'false');
                    return;
                  }
                } catch (e) {
                  console.log(`Failed to download artifact: ${e.message}`);
                }

                // Artifact not found — default to skip
                core.setOutput('tier', '0');
                core.setOutput('should_review', 'false');
                return;
              }

              console.log(`Attempt ${attempt}/${maxAttempts}: Route PR to Model ${latestRun ? `status '${latestRun.status}'` : 'not found'}, waiting...`);

              if (attempt < maxAttempts) {
                await new Promise(r => setTimeout(r, pollInterval));
              }
            }

            // Timed out
            console.log('Timed out waiting for Route PR to Model');
            core.setOutput('tier', '0');
            core.setOutput('should_review', 'false');

  droid-review:
    needs: wait-for-routing
    if: needs.wait-for-routing.outputs.should_review == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 20

      - name: Run Droid Auto Review - Tier 3 Deep Analysis
        uses: Factory-AI/droid-action@7e4b9ade9d2dd35cff9c9b0b83502697253aee51  # v1
        continue-on-error: true
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
