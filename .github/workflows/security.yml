name: Security Scan

on:
  schedule:
    # Run weekly on Mondays at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write
  issues: write

jobs:
  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          if npm audit --audit-level=moderate --json > audit-results.json; then
            echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Parse audit results
        id: parse
        run: |
          if [ -f audit-results.json ]; then
            vuln_count=$(jq '.metadata.vulnerabilities.total' audit-results.json 2>/dev/null || echo "0")
            echo "vulnerability_count=$vuln_count" >> $GITHUB_OUTPUT
            echo "audit_results=$(cat audit-results.json | jq -c '.' | head -c 5000)" >> $GITHUB_OUTPUT
          else
            echo "vulnerability_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Create security issue if vulnerabilities found
        if: steps.audit.outputs.vulnerabilities_found == 'true' && github.event_name == 'schedule'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const vulnerabilityCount = '${{ steps.parse.outputs.vulnerability_count }}';

            // Check if similar issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'vulnerability'],
              state: 'open'
            });

            if (existingIssues.data.length === 0) {
              // Build the issue body to avoid YAML parsing issues
              const bodyLines = [
                '## 🚨 Security Alert',
                '',
                '**Vulnerabilities Found:** ' + vulnerabilityCount,
                '',
                '### 📊 Scan Details',
                '- **Timestamp:** $(date \'+%Y-%m-%d %H:%M:%S UTC\')',
                '- **Trigger:** Scheduled security scan',
                '- **Scanner:** npm audit',
                '- **Severity Level:** Moderate and above',
                '',
                '### 🔍 Recommendations',
                '1. Review the audit results below',
                '2. Update affected packages',
                '3. Test changes thoroughly',
                '4. Deploy updates to production',
                '',
                '### 🛠️ Actions Required',
                '```bash',
                '# Update all packages',
                'npm update',
                '',
                '# Fix security vulnerabilities',
                'npm audit fix',
                '',
                '# Run audit again to verify',
                'npm audit',
                '```',
                '',
                '### 📋 Audit Summary',
                '```json',
                '${{ steps.parse.outputs.audit_results }}',
                '```',
                '',
                '---',
              ];

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Security Vulnerabilities Detected (${vulnerabilityCount} found)`,
                body: bodyLines.join('\n'),
                labels: ['security', 'vulnerability', 'automated'],
                assignees: ['${{ github.repository_owner }}']
              });
            }

      - name: Upload audit results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: security-audit-results
          path: audit-results.json
          retention-days: 7

      - name: Comment on PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const vulnerabilityCount = '${{ steps.parse.outputs.vulnerability_count }}';
            const vulnerabilitiesFound = '${{ steps.audit.outputs.vulnerabilities_found }}';

            const commentLines = [
              '## 🔒 Security Scan Results',
              '',
              '### 📊 Summary',
              '- **Vulnerabilities Found:** ' + (vulnerabilitiesFound === 'true' ? 'Yes' : 'No'),
              '- **Total Count:** ' + vulnerabilityCount,
              '- **Severity Level:** Moderate and above',
              ''
            ];

            if (vulnerabilitiesFound === 'true') {
              commentLines.push(
                '### ⚠️ Action Required',
                'Security vulnerabilities were detected. Please review and update the affected packages before merging.',
                '',
                '### 🛠️ Quick Fix',
                '```bash',
                'npm audit fix',
                'npm update',
                '```'
              );
            } else {
              commentLines.push(
                '### ✅ All Clear',
                'No security vulnerabilities found at moderate or higher severity levels.'
              );
            }

            commentLines.push(
              '',
              '### 📋 Details',
              'Full audit results are available in the workflow artifacts.',
              '',
              '---',
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentLines.join('\n')
            });

  codeql-scan:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'  # Only run on push/PR, not schedule

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4c50b6f6fd9dc6fe03111c2d045c8be2a724cce1  # v3.28.11
        with:
          languages: typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@4c50b6f6fd9dc6fe03111c2d045c8be2a724cce1  # v3.28.11

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4c50b6f6fd9dc6fe03111c2d045c8be2a724cce1  # v3.28.11
        with:
          category: "/language:typescript"

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b  # v3.94.2
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml
