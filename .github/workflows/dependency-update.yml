name: Dependency Update

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated dependencies
        id: outdated
        run: |
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ] && [ "$(cat outdated.json)" != "{}" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Update dependencies
        if: steps.outdated.outputs.updates_available == 'true'
        run: |
          npm update
          npm audit fix --audit-level moderate || true

      - name: Run tests
        if: steps.outdated.outputs.updates_available == 'true'
        run: npm test

      - name: Build application
        if: steps.outdated.outputs.updates_available == 'true'
        run: npm run build

      - name: Create Pull Request
        if: steps.outdated.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🔄 Update dependencies [skip ci]"
          title: "🔄 Automated Dependency Update"
          body: |
            ## 🤖 Automated Dependency Update

            This PR contains automated dependency updates.

            **Changes included:**
            - Updated npm packages to latest compatible versions
            - Fixed any security vulnerabilities (if found)
            - Verified tests and build pass

            **Update details:**
            - **Timestamp:** $(date '+%Y-%m-%d %H:%M:%S UTC')
            - **Trigger:** Scheduled dependency check

            **Next steps:**
            1. Review the changes
            2. Run tests locally if needed
            3. Merge if everything looks good


          branch: automated-dependency-update
          delete-branch: true
          labels: |
            dependencies
            automated-update